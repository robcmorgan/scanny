{% from "_macros.html" import alpha_bg %}
<div class="space-y-2 mt-2">
  {% for sub in subgroups %}
  <button
    data-subgroup-id="{{ sub.id }}"
    data-label="{{ sub.group.name }} / {{ sub.name }}"
    data-group-name="{{ sub.group.name }}"
    data-subgroup-name="{{ sub.name }}"
    data-filename-tag="{{ sub.filename_tag or '' }}"
    data-include-group="{{ 'true' if sub.group.include_in_path else 'false' }}"
    onclick="selectSubgroupFromEl(this)"
    class="w-full text-left {{ alpha_bg(sub.name) }} rounded-2xl px-4 py-3.5 shadow-sm active:scale-95 transition-transform"
  >
    <span class="text-xs opacity-60 block leading-tight">{{ sub.group.name }}</span>
    <span class="font-semibold block leading-snug">{{ sub.name }}</span>
  </button>
  {% endfor %}
  {% if not subgroups %}
  <p class="text-gray-400 py-4 text-center text-sm">No matches</p>
  {% endif %}
</div>
