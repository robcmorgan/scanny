<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Scanny{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <main class="flex-1 max-w-xl w-full mx-auto px-4 pt-5 pb-24">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom tab bar -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe z-30">
    <div class="max-w-xl mx-auto flex">
      <a href="/" class="flex-1 flex flex-col items-center pt-2 pb-3 gap-0.5 {% if active == 'scan' %}text-blue-600{% else %}text-gray-400{% endif %}">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="{% if active == 'scan' %}2.5{% else %}1.8{% endif %}">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs font-medium">Scan</span>
      </a>
      <a href="/library" class="flex-1 flex flex-col items-center pt-2 pb-3 gap-0.5 {% if active == 'library' %}text-blue-600{% else %}text-gray-400{% endif %}">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="{% if active == 'library' %}2.5{% else %}1.8{% endif %}">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/>
        </svg>
        <span class="text-xs font-medium">Library</span>
      </a>
      <a href="/tasks" class="flex-1 flex flex-col items-center pt-2 pb-3 gap-0.5 {% if active == 'tasks' %}text-blue-600{% else %}text-gray-400{% endif %}">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="{% if active == 'tasks' %}2.5{% else %}1.8{% endif %}">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span class="text-xs font-medium">Tasks</span>
      </a>
      <a href="/settings" class="flex-1 flex flex-col items-center pt-2 pb-3 gap-0.5 {% if active == 'settings' %}text-blue-600{% else %}text-gray-400{% endif %}">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="{% if active == 'settings' %}2.5{% else %}1.8{% endif %}">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span class="text-xs font-medium">Settings</span>
      </a>
    </div>
  </nav>

</body>
</html>
