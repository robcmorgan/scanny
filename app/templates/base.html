<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Scanny{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-slate-800 text-white px-4 py-3 flex gap-5 items-center">
    <span class="font-bold text-lg tracking-tight text-white">Scanny</span>
    <a href="/"        class="text-slate-300 hover:text-white text-sm {% if active == 'scan' %}text-white font-semibold{% endif %}">Scan</a>
    <a href="/library" class="text-slate-300 hover:text-white text-sm {% if active == 'library' %}text-white font-semibold{% endif %}">Library</a>
    <a href="/tasks"   class="text-slate-300 hover:text-white text-sm {% if active == 'tasks' %}text-white font-semibold{% endif %}">Tasks</a>
    <a href="/settings" class="text-slate-300 hover:text-white text-sm ml-auto {% if active == 'settings' %}text-white font-semibold{% endif %}">Settings</a>
  </nav>
  <main class="max-w-xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
