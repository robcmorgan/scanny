<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-bold text-gray-800">{{ group.name }}</h2>
  <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
</div>

<div class="space-y-2">
  {% for sub in subgroups %}
  <button
    data-subgroup-id="{{ sub.id }}"
    data-label="{{ group.name }} / {{ sub.name }}"
    data-group-name="{{ group.name }}"
    data-subgroup-name="{{ sub.name }}"
    data-filename-tag="{{ sub.filename_tag or '' }}"
    data-include-group="{{ 'true' if group.include_in_path else 'false' }}"
    onclick="selectSubgroupFromEl(this); closeModal()"
    class="w-full text-left bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 text-gray-800 font-medium hover:bg-blue-50 hover:border-blue-300 active:bg-blue-100 transition text-lg">
    {{ sub.name }}
  </button>
  {% endfor %}
  {% if not subgroups %}
  <p class="text-gray-400 text-sm text-center py-4">No subgroups yet</p>
  {% endif %}
</div>

<button
  hx-get="/subgroups/search?group_id={{ group.id }}&all=1"
  hx-target="#subgroup-modal-content"
  hx-swap="innerHTML"
  class="mt-4 w-full text-center text-sm text-blue-600 py-2 hover:underline">
  All subgroups in {{ group.name }} →
</button>
